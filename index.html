<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match Game</title>
    <link rel="stylesheet" href="styles.css" defer>
</head>
<body>

    <div class="container">

        <div class="sidebar">
            <h2>Levels</h2>
            <button onclick="startLevel(4)">Level 1 (4)</button>
            <button onclick="startLevel(8)">Level 2 (8)</button>
            <button onclick="startLevel(12)">Level 3 (12)</button>
            <p id="moves">Moves: 0</p>
        </div>

        <div class="game-area">
            <h1>🃏 Memory Match Game</h1>
            <button id="howBtn" class="how-btn">How to Play</button>
            <div id="howModal" class="modal hidden">
                <div class="modal-content">
                    <h2>How to Play</h2>
                    <p>
                        Click two cards to reveal images.<br>
                        If they match, they stay flipped.<br>
                        If not, they flip back.<br>
                        Match all cards to win the game!🃏
                    </p>
                    <button id="closeBtn">Close</button>
                </div>
            </div>
            <div id="gameBoard"></div>
        </div>

        

    </div>


    <script src="script.js" ></script>
</body>
</html>
